name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [develop, main]

# Cancela ejecuciones viejas si haces push seguidos al mismo PR/rama
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ecixpress

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ecixpress/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Informativo: reporta problemas de lint pero NO bloquea el CI.
      # Cuando arregles los errores de eslint, quita 'continue-on-error'
      # para volverlo un guardia obligatorio.
      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Build
        run: npm run build
